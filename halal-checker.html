<!DOCTYPE html>
<html lang="ar" dir="rtl" class="notranslate">
<head>
    <meta charset="UTF-8">
    <meta name="google" content="notranslate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Halal Scanner | فاحص الحلال</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <style>
        :root { --dark-green: #1b4332; --danger: #ae2012; --warning: #f39c12; --safe: #2d6a4f; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Cairo', sans-serif; background: #f4f7f6; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; }
        
        .container { background: white; width: 100%; max-width: 500px; padding: 30px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; }
        h1 { color: var(--dark-green); margin-bottom: 20px; font-size: 1.5rem; }

        .upload-area { border: 2px dashed var(--dark-green); padding: 40px 20px; border-radius: 20px; cursor: pointer; transition: 0.3s; margin-bottom: 20px; position: relative; }
        .upload-area:hover { background: #f0fdf4; }
        #file-input { position: absolute; width: 100%; height: 100%; top: 0; left: 0; opacity: 0; cursor: pointer; }
        .preview-img { width: 100%; max-height: 200px; object-fit: contain; display: none; margin-top: 15px; border-radius: 10px; }

        /* شريط التحميل الجديد */
        .loading-section { display: none; margin: 20px 0; }
        .progress-container { width: 100%; background: #eee; height: 20px; border-radius: 10px; overflow: hidden; margin-top: 10px; border: 1px solid #ddd; }
        .progress-bar-fill { height: 100%; width: 0%; background: var(--dark-green); transition: width 0.2s; display: flex; align-items: center; justify-content: center; color: white; font-size: 0.8rem; font-weight: bold; }

        .results-section { display: none; margin-top: 20px; text-align: right; }
        .prob-bar { height: 12px; background: #eee; border-radius: 6px; margin: 10px 0; overflow: hidden; }
        .fill { height: 100%; transition: width 1s ease-in-out; }
        
        .advice-box { padding: 15px; border-radius: 12px; margin-top: 20px; font-weight: bold; font-size: 1rem; text-align: center; border: 2px solid transparent; }
        
        .menu-wrapper { position: fixed; bottom: 25px; right: 25px; z-index: 2000; display: flex; flex-direction: column; align-items: flex-end; }
        .side-menu { background: white; width: 250px; border-radius: 15px; box-shadow: 0 5px 25px rgba(0,0,0,0.2); margin-bottom: 15px; display: none; flex-direction: column; border: 1px solid #ddd; }
        .side-menu.active { display: flex; }
        .menu-link { padding: 15px 20px; color: #333; text-decoration: none; border-bottom: 1px solid #f0f0f0; cursor: pointer; font-weight: bold; }
        .menu-toggle-btn { background: var(--dark-green); color: white; border: none; width: 60px; height: 60px; border-radius: 50%; font-size: 28px; cursor: pointer; }

        .loader { margin: 10px auto; border: 4px solid #f3f3f3; border-top: 4px solid var(--dark-green); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="container">
        <h1>فاحص المكونات الذكي</h1>
        
        <div class="upload-area" id="drop-area">
            <div id="upload-text">📁 ارفع صورة المكونات هنا</div>
            <input type="file" id="file-input" accept="image/*">
            <img id="preview" class="preview-img">
        </div>

        <div id="loading-section" class="loading-section">
            <div class="loader"></div>
            <p id="loading-status">جاري فحص المكونات بالذكاء الاصطناعي...</p>
            <div class="progress-container">
                <div id="progress-bar" class="progress-bar-fill">0%</div>
            </div>
        </div>

        <div id="results" class="results-section">
            <h3 style="text-align:center; margin-bottom:15px;">نتائج التحليل الرقمي:</h3>
            
            <label>نسبة الحرام: <span id="val-haram">0</span>%</label>
            <div class="prob-bar"><div id="bar-haram" class="fill" style="background: var(--danger); width: 0%;"></div></div>

            <label>نسبة الحلال: <span id="val-halal">0</span>%</label>
            <div class="prob-bar"><div id="bar-halal" class="fill" style="background: var(--safe); width: 0%;"></div></div>

            <label>احتمال خطأ التقنية: <span id="val-error">0</span>%</label>
            <div class="prob-bar"><div id="bar-error" class="fill" style="background: var(--warning); width: 0%;"></div></div>

            <div id="final-advice" class="advice-box"></div>
        </div>
    </div>

    <div class="menu-wrapper">
        <div id="side-menu" class="side-menu">
            <div class="menu-link" onclick="window.location.href='index.html'">🏠 العودة للرئيسية</div>
            <div class="menu-link" onclick="openContact()">📧 الإبلاغ عن خطأ</div>
        </div>
        <button class="menu-toggle-btn" onclick="toggleMenu()">☰</button>
    </div>

    <script>
        const fileInput = document.getElementById('file-input');
        const preview = document.getElementById('preview');
        const loadingSection = document.getElementById('loading-section');
        const progressBar = document.getElementById('progress-bar');
        const results = document.getElementById('results');

        const forbiddenWords = ['pork', 'lard', 'gelatin', 'bacon', 'ham', 'alcohol', 'wine', 'vignegar', 'e441', 'e471', 'خنزير', 'جيلاتين', 'كحول', 'خمر', 'شحم'];

        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = (e) => { 
                preview.src = e.target.result; 
                preview.style.display = 'block'; 
                document.getElementById('upload-text').style.display = 'none';
                analyzeImage(file);
            };
            reader.readAsDataURL(file);
        });

        async function analyzeImage(file) {
            loadingSection.style.display = 'block';
            results.style.display = 'none';
            progressBar.style.width = "0%";
            progressBar.innerText = "0%";

            // محاكاة عداد التحميل ليعطي تجربة مستخدم أفضل
            let progress = 0;
            const interval = setInterval(() => {
                if (progress < 90) {
                    progress += Math.random() * 15;
                    updateProgress(Math.min(progress, 90));
                }
            }, 400);

            try {
                const result = await Tesseract.recognize(file, 'eng+ara');
                clearInterval(interval);
                updateProgress(100);
                
                setTimeout(() => {
                    loadingSection.style.display = 'none';
                    results.style.display = 'block';
                    calculateProbabilities(result.data.text.toLowerCase());
                }, 500);

            } catch (err) { 
                clearInterval(interval);
                alert("فشل التحليل"); 
                loadingSection.style.display = 'none';
            }
        }

        function updateProgress(val) {
            const rounded = Math.round(val);
            progressBar.style.width = rounded + "%";
            progressBar.innerText = rounded + "%";
        }

        function calculateProbabilities(text) {
            let haramWeight = 0;
            forbiddenWords.forEach(word => { if (text.includes(word)) haramWeight += 40; });

            let probHaram = Math.min(haramWeight, 100);
            let probError = (text.trim().length < 30) ? 75 : 15;
            let probHalal = Math.max(0, 100 - probHaram - (probError * 0.5));

            updateResultBar('haram', probHaram);
            updateResultBar('halal', probHalal);
            updateResultBar('error', probError);

            const advice = document.getElementById('final-advice');
            if (probError > probHaram && probError > probHalal) {
                advice.innerHTML = "⚠️ تنبيه: الذكاء الاصطناعي يجد صعوبة في قراءة المكونات بدقة. ننصحك بالابتعاد عن المنتج أو فحصه يدوياً.";
                advice.className = "advice-box"; advice.style.background = "#fff3cd"; advice.style.color = "#856404";
            } else if (probHaram >= probHalal) {
                advice.innerHTML = "🚫 خطر: تم العثور على مواد محرمة أو مشبوهة بنسبة واضحة. يفضل عدم استهلاك المنتج.";
                advice.className = "advice-box"; advice.style.background = "#f8d7da"; advice.style.color = "#721c24";
            } else {
                advice.innerHTML = "✅ يبدو آمن: لم يتم رصد كلمات محرمة صريحة. توكل على الله.";
                advice.className = "advice-box"; advice.style.background = "#d4edda"; advice.style.color = "#155724";
            }
        }

        function updateResultBar(id, val) {
            document.getElementById(`val-${id}`).innerText = Math.round(val);
            document.getElementById(`bar-${id}`).style.width = val + "%";
        }

        function toggleMenu() { document.getElementById('side-menu').classList.toggle('active'); }
        function openContact() { window.location.href = `mailto:kintav@zohomail.eu?subject=ScannerError`; }
    </script>
</body>
</html>
