<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مذكراتي البسيطة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Tajawal', sans-serif;
        }
        .note-active {
            background-color: #eff6ff;
            border-color: #bfdbfe;
        }
        /* لإخفاء شريط التمرير */
        ::-webkit-scrollbar {
            width: 5px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
    </style>
</head>
<body class="bg-slate-50 h-screen overflow-hidden">

    <div id="app" class="flex h-full w-full">
        <!-- القائمة الجانبية -->
        <aside id="sidebar" class="w-full md:w-80 flex flex-col bg-white border-l border-slate-200 transition-all duration-300">
            <div class="p-6">
                <div class="flex items-center gap-3 mb-6">
                    <div class="bg-blue-600 p-2 rounded-xl text-white shadow-lg shadow-blue-200">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15.5 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V8.5L15.5 3Z"/><path d="M15 3v6h6"/><path d="M9 18h6"/><path d="M9 14h6"/></svg>
                    </div>
                    <h1 class="text-xl font-black text-slate-800 tracking-tight">مذكراتي</h1>
                </div>
                
                <div class="relative">
                    <input type="text" id="searchInput" placeholder="ابحث في مذكراتك..." 
                        class="w-full pr-10 pl-4 py-3 bg-slate-100 border-none rounded-2xl text-sm focus:ring-2 focus:ring-blue-500/20 outline-none transition-all">
                    <div class="absolute right-3 top-3.5 text-slate-400">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                    </div>
                </div>
            </div>

            <!-- قائمة المذكرات -->
            <div id="notesList" class="flex-1 overflow-y-auto px-4 space-y-2 pb-24">
                <!-- المذكرات ستظهر هنا برمجياً -->
            </div>

            <!-- زر إضافة مذكرة -->
            <div class="p-4 bg-white border-t border-slate-100">
                <button id="addNoteBtn" class="w-full bg-blue-600 hover:bg-blue-700 active:scale-95 text-white py-4 rounded-2xl shadow-xl shadow-blue-100 flex items-center justify-center gap-2 font-bold transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
                    إنشاء مذكرة جديدة
                </button>
            </div>
        </aside>

        <!-- منطقة المحرر -->
        <main id="editorArea" class="hidden md:flex flex-1 flex-col bg-white">
            <div id="editorContent" class="hidden flex-col h-full">
                <!-- رأس المحرر -->
                <header class="flex items-center justify-between px-6 py-4 border-b border-slate-100">
                    <button id="backBtn" class="md:hidden p-2 text-slate-500 hover:bg-slate-100 rounded-full">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
                    </button>
                    <div id="saveStatus" class="flex items-center gap-2 text-emerald-500 text-xs font-medium">
                        <div class="w-2 h-2 bg-emerald-500 rounded-full"></div>
                        <span>تم الحفظ تلقائياً</span>
                    </div>
                    <button id="deleteBtn" class="p-2.5 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-xl transition-all">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>
                    </button>
                </header>

                <!-- جسم المحرر -->
                <div class="flex-1 overflow-y-auto px-6 py-10 md:px-20 max-w-4xl mx-auto w-full">
                    <input type="text" id="noteTitle" placeholder="العنوان هنا..." 
                        class="w-full text-4xl font-black mb-8 focus:outline-none placeholder:text-slate-200 text-slate-800 bg-transparent border-none">
                    <textarea id="noteText" placeholder="اكتب ما يدور في ذهنك..." 
                        class="w-full h-full text-xl leading-relaxed focus:outline-none resize-none placeholder:text-slate-200 text-slate-600 bg-transparent border-none"></textarea>
                </div>
            </div>

            <!-- واجهة البداية (عندما لا توجد مذكرة مختارة) -->
            <div id="emptyState" class="flex flex-1 flex-col items-center justify-center p-12 text-center bg-slate-50/30">
                <div class="bg-white p-8 rounded-[2.5rem] shadow-sm mb-6">
                    <svg xmlns="http://www.w3.org/2000/svg" width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>
                </div>
                <h2 class="text-2xl font-bold text-slate-800">ابدأ بتسجيل أفكارك</h2>
                <p class="text-slate-500 mt-2 max-w-xs">اختر مذكرة من القائمة أو أنشئ واحدة جديدة لتبدأ الرحلة.</p>
            </div>
        </main>
    </div>

    <script>
        // --- إدارة الحالة (State Management) ---
        let notes = JSON.parse(localStorage.getItem('my_notes')) || [];
        let activeNoteId = null;

        const notesList = document.getElementById('notesList');
        const addNoteBtn = document.getElementById('addNoteBtn');
        const searchInput = document.getElementById('searchInput');
        const noteTitle = document.getElementById('noteTitle');
        const noteText = document.getElementById('noteText');
        const deleteBtn = document.getElementById('deleteBtn');
        const backBtn = document.getElementById('backBtn');
        const saveStatus = document.getElementById('saveStatus');

        // --- الوظائف الأساسية ---

        function saveToStorage() {
            localStorage.setItem('my_notes', JSON.stringify(notes));
            showSavingStatus();
        }

        function showSavingStatus() {
            saveStatus.innerHTML = '<div class="w-2 h-2 bg-blue-500 rounded-full animate-pulse"></div><span>جاري الحفظ...</span>';
            saveStatus.classList.replace('text-emerald-500', 'text-blue-500');
            setTimeout(() => {
                saveStatus.innerHTML = '<div class="w-2 h-2 bg-emerald-500 rounded-full"></div><span>تم الحفظ تلقائياً</span>';
                saveStatus.classList.replace('text-blue-500', 'text-emerald-500');
            }, 800);
        }

        function renderNotes(filter = '') {
            notesList.innerHTML = '';
            const filtered = notes.filter(n => n.title.includes(filter) || n.text.includes(filter));
            
            // ترتيب من الأحدث
            filtered.sort((a, b) => b.updatedAt - a.updatedAt);

            filtered.forEach(note => {
                const div = document.createElement('div');
                div.className = `p-4 rounded-2xl cursor-pointer transition-all border ${note.id === activeNoteId ? 'note-active border-blue-200' : 'bg-transparent border-transparent hover:bg-slate-50'}`;
                div.innerHTML = `
                    <div class="flex justify-between items-start">
                        <h3 class="font-bold text-sm truncate w-full ${note.id === activeNoteId ? 'text-blue-700' : 'text-slate-700'}">
                            ${note.title || 'عنوان فارغ'}
                        </h3>
                    </div>
                    <p class="text-xs text-slate-400 line-clamp-1 mt-1">${note.text.substring(0, 40) || 'لا يوجد نص...'}</p>
                `;
                div.onclick = () => selectNote(note.id);
                notesList.appendChild(div);
            });
        }

        function selectNote(id) {
            activeNoteId = id;
            const note = notes.find(n => n.id === id);
            
            document.getElementById('emptyState').classList.add('hidden');
            document.getElementById('editorContent').classList.remove('hidden');
            document.getElementById('editorContent').classList.add('flex');

            // في الجوال: إخفاء القائمة الجانبية وإظهار المحرر
            if (window.innerWidth < 768) {
                document.getElementById('sidebar').classList.add('hidden');
                document.getElementById('editorArea').classList.remove('hidden');
                document.getElementById('editorArea').classList.add('flex');
            }

            noteTitle.value = note.title;
            noteText.value = note.text;
            
            renderNotes(searchInput.value);
        }

        function createNote() {
            const newNote = {
                id: Date.now().toString(),
                title: '',
                text: '',
                updatedAt: Date.now()
            };
            notes.push(newNote);
            saveToStorage();
            selectNote(newNote.id);
        }

        function deleteNote() {
            if (!activeNoteId) return;
            notes = notes.filter(n => n.id !== activeNoteId);
            activeNoteId = null;
            saveToStorage();
            
            document.getElementById('emptyState').classList.remove('hidden');
            document.getElementById('editorContent').classList.add('hidden');
            
            if (window.innerWidth < 768) {
                goBack();
            }
            renderNotes();
        }

        function goBack() {
            document.getElementById('sidebar').classList.remove('hidden');
            document.getElementById('editorArea').classList.add('hidden');
            activeNoteId = null;
            renderNotes();
        }

        // --- مستمعي الأحداث (Event Listeners) ---

        addNoteBtn.onclick = createNote;
        deleteBtn.onclick = deleteNote;
        backBtn.onclick = goBack;

        searchInput.oninput = (e) => renderNotes(e.target.value);

        noteTitle.oninput = (e) => {
            const note = notes.find(n => n.id === activeNoteId);
            if (note) {
                note.title = e.target.value;
                note.updatedAt = Date.now();
                saveToStorage();
                renderNotes(searchInput.value);
            }
        };

        noteText.oninput = (e) => {
            const note = notes.find(n => n.id === activeNoteId);
            if (note) {
                note.text = e.target.value;
                note.updatedAt = Date.now();
                saveToStorage();
                renderNotes(searchInput.value);
            }
        };

        // تشغيل أولي
        renderNotes();
    </script>
</body>
</html>
